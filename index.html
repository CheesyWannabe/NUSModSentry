<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUS ModSentry — Academic Survival Dashboard</title>
  <meta name="description" content="NUS ModSentry: CourseReg Bidding Strategist & Ghost Room Finder for National University of Singapore students." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef4ff',
              100: '#dae6ff',
              200: '#bed3ff',
              300: '#90b5fd',
              400: '#608bf9',
              500: '#3b63f4',
              600: '#2343e8',
              700: '#1b30d5',
              800: '#1d29ac',
              900: '#1e2888',
              950: '#151a57',
            },
          },
          fontFamily: { sans: ['Inter','system-ui','sans-serif'] },
          animation: {
            'fade-in': 'fadeIn .25s ease',
            'slide-up': 'slideUp .3s ease',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
          },
          keyframes: {
            fadeIn:  { from:{opacity:0}, to:{opacity:1} },
            slideUp: { from:{opacity:0,transform:'translateY(12px)'}, to:{opacity:1,transform:'translateY(0)'} },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
    .dark ::-webkit-scrollbar-thumb{background:#475569}
    .tt-cell{min-height:52px;border-right:1px solid;border-bottom:1px solid}
    .chip-in{transition:all .2s}
    .chip-in:hover{transform:translateY(-1px)}
    .toast-enter{animation:slideUp .3s ease}
    .risk-glow-high{box-shadow:0 0 0 1px rgba(239,68,68,.3),0 4px 24px rgba(239,68,68,.12)}
    .risk-glow-med {box-shadow:0 0 0 1px rgba(245,158,11,.3),0 4px 24px rgba(245,158,11,.12)}
    .risk-glow-low {box-shadow:0 0 0 1px rgba(16,185,129,.3),0 4px 24px rgba(16,185,129,.12)}
    .glass{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div id="root"></div>
  <script>
    // Load and Babel-transform app.js at runtime (works on HTTP servers & GitHub Pages)
    fetch('./app.js')
      .then(r => r.text())
      .then(src => {
        const code = Babel.transform(src, { presets: ['react'] }).code;
        const s = document.createElement('script');
        s.textContent = code;
        document.body.appendChild(s);
      })
      .catch(e => {
        document.getElementById('root').innerHTML =
          '<div style="color:#f87171;padding:2rem;font-family:monospace">Failed to load app.js: ' + e.message + '</div>';
      });
  </script>
</body>
</html>
